<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title></title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow: hidden;
}

/* màn xoay */
#rotateScreen {
    display: none;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    font-size: 22px;
    padding: 20px;
}

/* nội dung */
#mainContent {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
}

.container {
    text-align: center;
    width: 90%;
    max-width: 400px;
}

h1 {
    font-size: 22px;
    margin-bottom: 20px;
}

/* input */
input {
    padding: 12px;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    width: 100%;
    margin-bottom: 20px;
}

/* nút */
.buttons {
    display: flex;
    justify-content: center;
    gap: 15px;
}

button {
    padding: 12px 20px;
    font-size: 16px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.25s;
}

#yes {
    background: #ff4d6d;
    color: white;
    box-shadow: 0 5px 15px rgba(255,0,80,0.4);
}

#yes:hover {
    transform: scale(1.1);
}

#no {
    background: #ddd;
}

/* link */
#messLink {
    display: none;
    margin-top: 20px;
    font-size: 18px;
    color: white;
    background: #ff4d6d;
    padding: 10px 20px;
    border-radius: 10px;
    text-decoration: none;
}

/* 🌸 hiệu ứng */
.effect {
    position: fixed;
    font-size: 20px;
    animation: fly 2s linear forwards;
}

@keyframes fly {
    0% {transform: translate(0,0) scale(0.5); opacity:1;}
    100% {transform: translate(var(--x), var(--y)) scale(1.5); opacity:0;}
}
</style>

</head>

<body>

<!-- xoay -->
<div id="rotateScreen">
📱 Hãy xoay ngang điện thoại ra nhé 😘
</div>

<!-- nội dung -->
<div id="mainContent">
<div class="container">

<h1 id="text">Hôm nay đi làm của e ntn?</h1>

<input id="inputBox" placeholder="Viết vào đây..." />

<div class="buttons">
    <button id="yes">Tiếp ➡️</button>
    <button id="no" style="display:none;">Không</button>
</div>

<a id="messLink" href="https://m.me/" target="_blank">
👉 Nhắn luôn nhé 😘
</a>

</div>
</div>

<!-- 🎵 NHẠC -->
<audio id="music" src="only.mp3"></audio>

<script>
let step = 1;
let scaleYes = 1;
let scaleNo = 1;

let text = document.getElementById("text");
let yesBtn = document.getElementById("yes");
let noBtn = document.getElementById("no");
let inputBox = document.getElementById("inputBox");
let messLink = document.getElementById("messLink");
let music = document.getElementById("music");

let rotateScreen = document.getElementById("rotateScreen");
let mainContent = document.getElementById("mainContent");

// 👉 xoay
function checkRotate() {
    if (window.innerHeight > window.innerWidth) {
        rotateScreen.style.display = "flex";
        mainContent.style.display = "none";
    } else {
        rotateScreen.style.display = "none";
        mainContent.style.display = "flex";
    }
}
checkRotate();
window.addEventListener("resize", checkRotate);

// 👉 hiệu ứng
function createEffect(icon) {
    for (let i = 0; i < 12; i++) {
        let e = document.createElement("div");
        e.className = "effect";
        e.innerText = icon;

        let x = (Math.random() - 0.5) * 600 + "px";
        let y = (Math.random() - 0.5) * 600 + "px";

        e.style.setProperty("--x", x);
        e.style.setProperty("--y", y);

        document.body.appendChild(e);
        setTimeout(() => e.remove(), 2000);
    }
}

// 👉 size
function updateSize() {
    yesBtn.style.transform = "scale(" + scaleYes + ")";
    noBtn.style.transform = "scale(" + scaleNo + ")";
}

// 👉 shrink
function shrinkNo() {
    if (scaleNo > 0.3) {
        scaleNo -= 0.1;
        scaleYes += 0.1;
        updateSize();
    }
}

// 👉 chạy trốn
function moveCrazy() {
    let x = Math.random() * (window.innerWidth - 100);
    let y = Math.random() * (window.innerHeight - 50);

    noBtn.style.position = "fixed";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

// 👉 YES
yesBtn.onclick = () => {
    music.play();
    createEffect("💖");

    step++;

    scaleYes = 1;
    scaleNo = 1;
    updateSize();

    noBtn.style.position = "static";
    noBtn.onmouseover = null;

    if (step === 2) {
        text.innerText = "E không thích nói chuyện với tôi à 👉👈?";
        inputBox.style.display = "none";

        yesBtn.innerText = "Có";
        noBtn.innerText = "Không";
        noBtn.style.display = "inline-block";
    }

    else if (step === 3) {
        text.innerText = "Vậy sao em bơ tôi vậy 😢";
        yesBtn.innerText = "Xin nhỗi";
        noBtn.innerText = "Phải chịu";
    }

    else if (step === 4) {
        text.innerText = "Ok! Vậy giờ mở mess lên và nhắn luôn thôi";
        yesBtn.innerText = "Oki";
        noBtn.innerText = "Còn lâu";

        noBtn.onmouseover = moveCrazy;
        noBtn.ontouchstart = moveCrazy;
    }

    else if (step === 5) {
        text.innerText = "Nhắn luôn nhé 😘";

        yesBtn.style.display = "none";
        noBtn.style.display = "none";

        messLink.style.display = "inline-block";
        createEffect("🌸");
    }
};

// 👉 NO
noBtn.onclick = () => {
    createEffect("😏");

    if (step === 2 || step === 3) {
        shrinkNo();
    }
    if (step === 4) {
        moveCrazy();
    }
};
</script>

</body>
</html>
